services:
  postgres:
    image: postgres:16-alpine
    container_name: studysync-postgres
    environment:
      POSTGRES_DB: studysync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - studysync-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studysync"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: studysync-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/studysync
      PORT: 4000
      JWT_SECRET: replace-with-very-strong-secret-key
      CLIENT_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
    container_name: studysync-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  studysync-postgres-data:
